<!-- Contact Us Page Template -->
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0"><i class="fas fa-envelope me-2"></i>Contact Us</h4>
            </div>
            <div class="card-body">
                <form id="contact-form" novalidate>
                    <div class="mb-3">
                        <label for="contact-name" class="form-label required-field">Full Name</label>
                        <input type="text" class="form-control" id="contact-name" required>
                        <div class="invalid-feedback">Please enter your name.</div>
                    </div>
                    <div class="mb-3">
                        <label for="contact-email" class="form-label required-field">Email Address</label>
                        <input type="email" class="form-control" id="contact-email" required>
                        <div class="invalid-feedback">Please enter a valid email address.</div>
                    </div>
                    <div class="mb-3">
                        <label for="contact-description" class="form-label required-field">Message</label>
                        <textarea class="form-control" id="contact-description" rows="4" required></textarea>
                        <div class="invalid-feedback">Please enter your message.</div>
                    </div>
                    <button type="submit" class="btn btn-info text-white w-100">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</div>
