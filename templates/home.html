<!-- Home Page Template -->
<div class="row">
    <div class="col-12 text-center mb-4">
        <h1 class="display-5 fw-bold text-primary">Welcome to upGrad Virtual Events</h1>
        <p class="lead">Discover and register for upcoming tech and industrial events</p>
    </div>
</div>

<div class="row mb-4">
    <div class="col-md-8 mx-auto">
        <div class="input-group">
            <input type="text" class="form-control" id="home-search" placeholder="Search events by ID, name or category...">
            <button class="btn btn-outline-primary" type="button" id="home-search-btn">
                <i class="fas fa-search"></i> Search
            </button>
            <button class="btn btn-outline-secondary" type="button" id="home-clear-search">Clear</button>
        </div>
    </div>
</div>

<div class="row g-4" id="home-events-container">
    <!-- Events will be dynamically loaded here -->
</div>
